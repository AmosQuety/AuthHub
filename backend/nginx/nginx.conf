worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ── Rate limiting zones ───────────────────────────────────────────────────
  # Shared memory zone tracking requests per client IP
  limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=60r/m;

  # ── Upstream ──────────────────────────────────────────────────────────────
  upstream authhub_app {
    server app:3000;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS server ──────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    # SSL — mount your certs here (e.g. via Certbot / Let's Encrypt)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── Auth routes — strict rate limit ───────────────────────────────────
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
      limit_req zone=auth_zone burst=5 nodelay;
      limit_req_status 429;

      proxy_pass         http://authhub_app;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All other API routes — generous limit ──────────────────────────────
    location / {
      limit_req zone=api_zone burst=20 nodelay;
      limit_req_status 429;

      proxy_pass         http://authhub_app;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
